meta:
  project: phase2-python-engine
  project_id: phase2-python-engine
  created: 2026-04-14T09:27:18.417Z
  updated: 2026-04-24T00:00:00.000Z
  version: 1
  description: "Phase 2: Python Data Engine for EX-APPAgent。在 EX-APPAgent 仓库的
    engine/ 目录下构建完整的 Python 数据引擎，支持 App Store Connect API 和 Google Play
    Developer API 自动采集数据，趋势分析，实验预计算，并通过 CLI 和 macOS launchd 定时调度。两个实际
    app：ClipAudio (com.tto.clipaudio) 和 HairMakeover
    (com.tto321.hairmakeover321/com.tto.hairmakeover)。技术栈：Python 3.12 + uv。"
tasks:
  - id: "1"
    title: 初始化 Python 项目骨架
    description: "用 uv 初始化 engine/ 目录：pyproject.toml（Python 3.12, 依赖: httpx, PyJWT,
      cryptography, click, google-api-python-client,
      google-auth）、src/appagent_engine/ 包结构、所有子目录（collectors/, analyzer/,
      store/, extensions/）。验收：uv sync 成功，python -c 'import appagent_engine'
      无报错。"
    priority: critical
    estimate: 1h
    dependencies: []
    status: completed
  - id: "2"
    title: 实现配置管理与 App 注册表
    description: 实现 config.py：读取 ~/.appagent/config.json（API keys 路径、全局设置）和
      ~/.appagent/apps.json（已注册 app 列表及其项目路径）。支持按 app_id 查找项目路径，自动发现 program.md
      中的 app_store_id 和 store_url。验收：能正确加载配置、列出已注册 app、按 ID 查找 app 信息。
    priority: critical
    estimate: 1.5h
    dependencies:
      - "1"
    status: completed
  - id: "3"
    title: 实现原子文件写入器
    description: 实现 store/writer.py：atomic_write_json(path, data) 和
      atomic_write_text(path, data)。使用 tempfile + os.replace()
      模式确保不会出现部分写入。自动创建父目录。验收：并发写入测试不出现损坏文件，中断写入不留半成品。
    priority: critical
    estimate: 1h
    dependencies:
      - "1"
    status: completed
  - id: "4"
    title: 实现 health.json 上报器
    description: 实现 health.py：HealthReporter 类，在每次采集运行后写入
      .appagent/health.json。记录：python_engine.last_run/last_success/status/errors、data_freshness（metrics/competitors/aso
      的最新日期）、api_status（各 API 连接状态）。使用原子写入。验收：采集成功/失败后 health.json
      内容正确反映状态，Skill 层 harness-loop Step 2 能正常读取。
    priority: critical
    estimate: 1h
    dependencies:
      - "3"
    status: completed
  - id: "5"
    title: 实现系统级护栏
    description: 实现 guardrails.py：(1) validate_file_path(path) — 只允许写入 .appagent/ 和
      engine/ 目录内的文件；(2) validate_budget(amount, daily_limit) — 检查单日预算不超限；(3)
      validate_network(url, whitelist) — 检查网络请求目标在白名单内。所有写入操作经过护栏校验。验收：尝试写入
      .appagent/ 外的路径时抛出 GuardrailViolation 异常。
    priority: high
    estimate: 1h
    dependencies:
      - "2"
    status: completed
  - id: "6"
    title: 实现 App Store Connect API 认证
    description: 实现 collectors/appstore.py 的认证部分：从 config.json 读取 API Key（key_id,
      issuer_id, private_key_path），生成 JWT token（ES256 签名，20 分钟有效期），构建带认证头的 httpx
      client。验收：能成功生成合法 JWT，向 App Store Connect API 发送认证请求并获得 200 响应。
    priority: critical
    estimate: 2h
    dependencies:
      - "2"
    status: completed
  - id: "7"
    title: 实现 App Store Connect 销售数据采集
    description: 在 collectors/appstore.py 中实现：通过 Sales and Trends Reports API
      获取每日收入（按 app）、下载量、订阅数据。处理 T-2 天数据延迟（自动计算正确的 reportDate）。解析 gzip 压缩的 TSV
      响应。输出标准化的 dict 结构。验收：能成功拉取 ClipAudio 和 HairMakeover 的最近 7 天销售数据。
    priority: critical
    estimate: 3h
    dependencies:
      - "3"
      - "6"
    status: completed
  - id: "8"
    title: 实现 App Store Connect 评分与评论采集
    description: 在 collectors/reviews.py 中实现 iOS 评论采集：通过 App Store Connect API 的
      Customer Reviews 端点拉取评论（支持分页），提取评分、标题、正文、日期。同时从 App Store
      公开数据获取当前评分和评分数。验收：能拉取 ClipAudio 的最新评论和当前评分。
    priority: high
    estimate: 2h
    dependencies:
      - "3"
      - "6"
    status: completed
  - id: "9"
    title: 实现每日指标组装器
    description: 实现 collectors/assembler.py：将 App Store Connect 的
      revenue/downloads/ratings/reviews/subscriptions 数据组装为标准的
      data/metrics/YYYY-MM-DD.json 格式（与设计文档一致）。使用原子写入。验收：生成的 JSON 文件格式与设计文档中
      daily metrics 格式完全匹配，Skill 层 harness-loop Step 4 能正常读取。
    priority: critical
    estimate: 1.5h
    dependencies:
      - "3"
      - "7"
    status: completed
  - id: "10"
    title: 实现 Google Play Developer API 认证
    description: 实现 collectors/googleplay.py 的认证部分：从 config.json 读取 Service Account
      JSON 路径，使用 google-auth 库建立认证凭据，构建 androidpublisher API client。验收：能成功认证并向
      Google Play Developer API 发送请求。
    priority: high
    estimate: 1.5h
    dependencies:
      - "2"
    status: completed
  - id: "11"
    title: 实现 Google Play 销售与统计数据采集
    description: 在 collectors/googleplay.py 中实现：通过 Google Play Developer Reporting
      API 获取每日收入、下载量、订阅数据。处理 Google 的报告格式（GCS bucket CSV）。输出与 iOS 侧相同结构的标准化
      dict。验收：能成功拉取 ClipAudio Android 版的销售数据。
    priority: high
    estimate: 3h
    dependencies:
      - "3"
      - "10"
    status: completed
  - id: "12"
    title: 实现 Google Play 评论采集
    description: 在 collectors/reviews.py 中扩展 Android 评论采集：通过 Google Play Developer
      API 的 reviews.list 端点拉取评论。与 iOS 评论使用统一的输出结构。验收：能拉取 HairMakeover Android
      版的最新评论。
    priority: high
    estimate: 1.5h
    dependencies:
      - "3"
      - "10"
    status: completed
  - id: "13"
    title: 实现双平台指标合并
    description: 扩展 assembler.py：将 iOS 和 Android 的数据合并为单个
      data/metrics/YYYY-MM-DD.json（revenue 相加，downloads 相加，ratings
      取加权平均，评论分别保留）。支持单平台 app 和双平台 app。验收：ClipAudio 的 daily metrics 包含
      iOS+Android 合并数据，字段含 platform_breakdown。
    priority: high
    estimate: 1.5h
    dependencies:
      - "9"
      - "11"
    status: completed
  - id: "14"
    title: 实现 ASO 关键词排名追踪
    description: 实现 collectors/aso.py：通过 App Store Search API（公开接口）检查目标关键词的搜索排名。从
      program.md 的 competitors.watch_list 和手动配置中提取关键词列表。输出到
      data/aso/keywords.json。验收：能查询 ClipAudio 的关键词 'ringtone maker', 'audio
      editor' 的当前排名。
    priority: medium
    estimate: 2h
    dependencies:
      - "3"
      - "2"
    status: completed
  - id: "15"
    title: 实现竞品公开数据采集
    description: 实现 collectors/competitor.py：从 App Store 和 Google Play
      公开页面采集竞品信息（评分、评分数、价格、最近更新日期、版本号、描述摘要）。用 httpx 请求公开 API/页面。不依赖第三方付费平台。输出到
      data/competitors/{app_name}.json。验收：能采集 program.md watch_list 中竞品的基本公开数据。
    priority: medium
    estimate: 2.5h
    dependencies:
      - "3"
      - "2"
    status: completed
  - id: "16"
    title: 实现趋势分析器
    description: 实现 analyzer/trends.py：(1) 计算 WoW（周环比）和 MoM（月环比）变化；(2) 计算历史滚动标准差（默认
      30 天窗口）；(3) 异常检测：当日值偏离均值超过 2x 标准差时标记为异常。输入：data/metrics/ 目录下的 JSON
      文件序列。输出：趋势摘要 dict。验收：给定模拟数据，能正确计算 WoW/MoM/std_dev/anomaly 标记。
    priority: high
    estimate: 2h
    dependencies:
      - "3"
    status: completed
  - id: "17"
    title: 实现实验预计算器
    description: 实现 analyzer/experiment.py：读取 .appagent/experiments/active.json，对每个
      observation_end_date <= today 的实验，计算
      metric_before/metric_after/delta_pct/historical_std_dev/exceeds_2x_std_dev/daily_breakdown。检测观察期内的外部事件。写入
      experiments/pre-calc/exp_xxx.json。不做判决（判决由 Skill 层 LLM
      负责）。验收：给定活跃实验和指标数据，能生成正确的 pre-calc 文件。
    priority: high
    estimate: 2h
    dependencies:
      - "3"
      - "16"
    status: completed
  - id: "18"
    title: 实现经验库管理器
    description: 实现 store/experience.py：管理 per-app insights/ 和
      ~/.appagent/global-insights/ 的经验文件（按 aso/pricing/growth/product
      四类）。支持读取、追加条目、跨 app 同步（当 cross_app_applicable=true 时）。验收：能正确读写经验条目，跨 app
      同步正常工作。
    priority: medium
    estimate: 1.5h
    dependencies:
      - "3"
    status: completed
  - id: "19"
    title: 实现 CLI 入口
    description: 实现 cli.py（基于 click）：(1) appagent collect [--app APP_ID] —
      手动触发一次完整数据采集；(2) appagent health — 显示引擎健康状态和数据新鲜度；(3) appagent daemon /
      appagent daemon stop — 启动/停止定时采集。在 pyproject.toml 中注册 console_scripts
      入口点。验收：uv run appagent collect 能成功执行完整采集流程，appagent health 输出格式化状态。
    priority: high
    estimate: 2h
    dependencies:
      - "4"
      - "7"
      - "11"
      - "13"
      - "14"
      - "15"
      - "16"
      - "17"
    status: completed
  - id: "20"
    title: 实现 macOS launchd 定时调度
    description: 实现 scheduler.py：(1) 生成 com.appagent.collect.plist（每日早 6 点运行
      collect）；(2) 生成 com.appagent.reviews.plist（每 8 小时运行评论采集）；(3) daemon
      命令安装/卸载 plist 到 ~/Library/LaunchAgents/；(4) 日志输出到
      ~/.appagent/logs/。验收：appagent daemon 后 launchctl list 能看到已注册的任务。
    priority: medium
    estimate: 2h
    dependencies:
      - "19"
    status: completed
  - id: "21"
    title: 扩展目录与 README
    description: 创建 engine/extensions/README.md：说明扩展开发约束（只能写入
      .appagent/、不能访问敏感路径、必须通过护栏校验）。创建 extensions/__init__.py。验收：README 内容与设计文档中
      Capability Expansion 章节一致。
    priority: low
    estimate: 0.5h
    dependencies:
      - "1"
    status: completed
  - id: "22"
    title: 端到端集成测试
    description: 对 ClipAudio 项目执行完整的 collect 流程：(1) 运行 appagent collect --app
      com.tto.clipaudio；(2) 验证 .appagent/data/metrics/ 生成了正确格式的日期文件；(3) 验证
      .appagent/health.json 状态为 ok；(4) 验证 Skill 层 /appagent
      能正常读取新数据并用于分析。修复发现的所有兼容性问题。验收：从 collect 到 Skill 层读取的完整链路跑通。
    priority: critical
    estimate: 3h
    dependencies:
      - "19"
    status: pending

      ROAS（总归因收入/总支出）；(2) calc_daily_spend(entries, date) 计算单日总支出；(3)
      check_budget_compliance(entries, daily_limit, min_roas) 返回 {within_limit:
      bool, current_roas: float, daily_spend: float, warnings: []}。对照 program.md
      的 daily_limit 和 min_roas。验收：给定模拟数据，能正确计算 ROAS 并检测超预算。"

  - id: "9"
    title: 实现能力扩展安全检查器
    description: "在 guardrails.py 中添加 validate_extension_code(code_str) 函数：(1)
      静态分析代码字符串，检查 import 列表；(2) 检查是否有 open() 调用写入 .appagent/ 和 engine/
      之外的路径；(3) 检查是否有 requests/httpx/urllib 调用非白名单域名；(4) 检查是否访问敏感路径（~/.ssh
      等）；(5) 返回 {safe: bool, violations: []}。验收：包含 open('/etc/passwd')
      的代码被标记为不安全。"
    status: completed
    priority: high
    estimate: 2h
    dependencies: []

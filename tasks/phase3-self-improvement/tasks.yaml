tasks:
  - id: "1"
    title: 实现里程碑自动检测引擎
    description: "在 engine/src/appagent_engine/analyzer/ 下新建 milestone.py：(1) 读取
      data/metrics/ 最近 N 天的 daily_revenue；(2) 对照 program.md 中的 milestones
      配置判断是否连续 3 天达标；(3) 返回 {reached: bool, milestone: str, consecutive_days:
      int, unlocks: str}。不修改 state.json（由 Skill 层负责）。验收：给定模拟数据，连续 3 天 $1.2/day
      能正确检测到 $1 里程碑达成。"
    status: completed
    priority: critical
    estimate: 1.5h
    dependencies: []
  - id: "2"
    title: 实现里程碑配置解析器
    description: "在 config.py 中添加 parse_milestones(program_md_path) 函数：从 program.md
      解析 milestones 列表，返回 [{target: 1.0, label: '$1/day', unlocks: 'small ad
      spend'}, ...] 结构。验收：能正确解析 ClipAudio 和 HairMakeover 的 program.md 中的
      milestones。"
    status: completed
    priority: critical
    estimate: 1h
    dependencies: []
  - id: "3"
    title: 集成里程碑检测到 CLI collect
    description: 在 cli.py 的 _collect_one_app 末尾、experiments 之后增加里程碑检测：调用
      milestone.check_milestone()，如果达成则输出提示并写入一个标记文件
      .appagent/milestone_pending.json（包含 milestone 信息）。Skill 层 harness-loop 在
      Step 3 读到此文件后触发 Priority 1。验收：当 metrics 数据连续 3 天达到 $1 时，collect 命令输出里程碑提示。
    status: completed
    priority: critical
    estimate: 1h
    dependencies:
      - "1"
      - "2"
  - id: "4"
    title: 更新 Skill 层里程碑处理逻辑
    description: 更新 harness-loop.md Step 3 和 priority-engine.md：(1) Step 3 读取
      .appagent/milestone_pending.json，如果存在则标记 milestone_reached；(2) Priority 1
      逻辑：展示庆祝信息、显示解锁的策略空间、更新 state.json 的 stage 字段、删除
      milestone_pending.json。验收：/appagent 运行时能检测到里程碑并正确触发 Priority 1 流程。

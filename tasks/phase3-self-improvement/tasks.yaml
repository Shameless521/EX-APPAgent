    title: 实现扩展加载器和 dry-run 框架
    description: 新建 engine/src/appagent_engine/extensions/loader.py：(1)
      list_extensions() 列出 extensions/ 下所有 .py 文件；(2) load_extension(name)
      动态导入指定扩展模块；(3) dry_run_extension(name, mock_input) 在沙盒中运行扩展，捕获输出但不写入真实文件（用
      mock 替换 writer）；(4) activate_extension(name) 标记为活跃。扩展状态存在
      extensions/registry.json。验收：能加载、dry-run、激活一个示例扩展。
    status: completed
    priority: high
    estimate: 2h
